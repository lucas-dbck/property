<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YieldDesk Import</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        width: 320px;
        margin: 0;
        background: #f7faf9;
        color: #082522;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #4d625f;
        font-size: 13px;
        line-height: 1.4;
      }

      label {
        display: grid;
        gap: 6px;
        color: #314a46;
        font-size: 12px;
        font-weight: 600;
      }

      input {
        border: 1px solid #c9d8d5;
        border-radius: 6px;
        padding: 9px 10px;
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 6px;
        background: #007f72;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 10px 12px;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      #status {
        min-height: 18px;
        font-size: 12px;
      }

      .error {
        color: #b42318;
      }

      .ok {
        color: #007f72;
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>YieldDesk</h1>
        <p>Import this Immoweb listing into the ROI analyzer.</p>
      </div>

      <label>
        YieldDesk app URL
        <input id="appUrl" type="url" spellcheck="false" />
      </label>

      <button id="importButton" type="button">Import current listing</button>
      <p id="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
